<title>WP Guider — Topic × Difficulty 矩阵</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
    --accent: #3b82f6; --green: #22c55e; --yellow: #eab308;
    --orange: #f97316; --red: #ef4444; --purple: #a855f7;
    --blue-dim: #1e3a5f; --green-dim: #14532d; --new: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 24px; line-height: 1.5; }

  /* Header */
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .header p { color: var(--text2); font-size: 14px; }

  /* Stats bar */
  .stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 32px; flex-wrap: wrap; }
  .stat { background: var(--surface); border-radius: 12px; padding: 16px 24px; text-align: center; min-width: 120px; }
  .stat .num { font-size: 32px; font-weight: 700; }
  .stat .label { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .stat.total .num { color: var(--accent); }
  .stat.existing .num { color: var(--green); }
  .stat.new .num { color: var(--new); }
  .stat.topics .num { color: var(--yellow); }
  .stat.coverage .num { color: var(--purple); }

  /* Difficulty legend */
  .legend { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; font-size: 13px; }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 12px; height: 12px; border-radius: 3px; }

  /* Matrix */
  .matrix-wrap { overflow-x: auto; }
  .matrix { width: 100%; border-collapse: separate; border-spacing: 2px; }
  .matrix th { background: var(--surface); padding: 10px 12px; font-size: 13px; font-weight: 600; position: sticky; top: 0; z-index: 2; white-space: nowrap; }
  .matrix th.topic-header { text-align: left; min-width: 200px; }
  .matrix th.diff-header { text-align: center; width: 18%; }
  .matrix th.diff-header .diff-label { font-size: 11px; color: var(--text2); font-weight: 400; }

  /* Category row */
  .matrix tr.category-row td { background: var(--surface2); font-weight: 700; font-size: 14px; padding: 8px 12px; color: var(--yellow); border-radius: 6px; }

  /* Topic row */
  .matrix td { padding: 0; vertical-align: top; }
  .matrix td.topic-name { background: var(--surface); padding: 10px 12px; font-size: 13px; border-radius: 6px 0 0 6px; white-space: nowrap; }
  .matrix td.topic-name .sub { color: var(--text3); font-size: 11px; }

  /* Cell */
  .cell { background: var(--surface); border-radius: 4px; min-height: 48px; padding: 6px 8px; position: relative; }
  .cell.empty { background: rgba(30,41,59,0.4); }
  .cell.has-tasks { cursor: pointer; transition: background 0.15s; }
  .cell.has-tasks:hover { background: var(--surface2); }
  .cell .count { font-size: 18px; font-weight: 700; text-align: center; }
  .cell .count.c-existing { color: var(--green); }
  .cell .count.c-new { color: var(--new); }
  .cell .count.c-mixed { color: var(--accent); }
  .cell .task-list { display: block; margin-top: 6px; }
  .cell .task-item { font-size: 11px; color: var(--text2); padding: 3px 0; border-top: 1px solid rgba(255,255,255,0.05); line-height: 1.4; }
  .cell .task-item:first-child { border-top: none; }
  .cell .task-item .tid { color: var(--text3); font-family: monospace; font-size: 10px; }
  .cell .task-item a { color: inherit; text-decoration: none; display: block; } .cell .task-item a:hover { color: var(--accent); }

  /* Diff bar inside cell */
  .cell .bar { height: 3px; border-radius: 2px; margin-top: 4px; }
  .cell .bar.b1 { background: var(--green); }
  .cell .bar.b2 { background: var(--accent); }
  .cell .bar.b3 { background: var(--yellow); }
  .cell .bar.b4 { background: var(--orange); }
  .cell .bar.b5 { background: var(--red); }

  /* Row totals */
  .matrix td.row-total { background: var(--surface); padding: 10px 8px; text-align: center; font-weight: 600; font-size: 14px; border-radius: 0 6px 6px 0; color: var(--text2); }

  /* Footer */
  .footer { text-align: center; margin-top: 32px; color: var(--text3); font-size: 12px; }

  /* Responsive */
  @media (max-width: 768px) {
    body { padding: 12px; }
    .stats { gap: 8px; }
    .stat { padding: 12px 16px; min-width: 80px; }
    .stat .num { font-size: 24px; }
  }
</style>

// ========== RENDER ==========

function render() {
  const totalAll = TASK_MAP.length;
  const totalTopics = ALL_TOPICS.length;

  // Count filled cells

  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="stat total"><div class="num">${totalAll}</div><div class="label">总题目数</div></div>
    <div class="stat topics"><div class="num">${totalTopics}</div><div class="label">知识主题</div></div>
  `;

  // Matrix
  let html = '<thead><tr>';
  html += '<th class="topic-header">知识主题 Topic</th>';
  DIFFS.forEach(d => {
    html += `<th class="diff-header"><div>${d.label}</div><div class="diff-label">${d.desc}</div></th>`;
  });
  html += '<th class="diff-header" style="width:60px">合计</th>';
  html += '</tr></thead><tbody>';

  CATEGORIES.forEach(cat => {
    // Category header row
    html += `<tr class="category-row"><td colspan="${DIFFS.length + 2}">${cat.name}</td></tr>`;

    cat.topics.forEach(topic => {
      const topicTasks = TASK_MAP.filter(t => t.topic === topic.id);
      const topicTotal = topicTasks.length;

      html += '<tr>';
      html += `<td class="topic-name">${topic.name}<div class="sub">${topic.sub}</div></td>`;

      DIFFS.forEach(d => {
        const cellTasks = topicTasks.filter(t => t.newDiff === d.level);
        
        
        const count = cellTasks.length;

        if (count === 0) {
          html += '<td><div class="cell empty"></div></td>';
        } else {
          const countClass = 'c-existing';
          let taskListHtml = cellTasks.map(t =>
            `<div class="task-item "><a href="docs/${t.topic}/${t.id}.html"><span class="tid">${t.id}</span> ${t.desc}</a></div>`
          ).join('');

          html += `<td><div class="cell has-tasks" onclick="this.classList.toggle('expanded')">
            <div class="count ${countClass}">${count}</div>
            <div class="bar b${d.level}" style="width:${Math.min(count * 20, 100)}%"></div>
            <div class="task-list">${taskListHtml}</div>
          </div></td>`;
        }
      });

      // Row total
      html += `<td class="row-total">${topicTotal}</td>`;
      html += '</tr>';
    });
  });

  html += '</tbody>';
  document.getElementById('matrix').innerHTML = html;
  document.getElementById('gen-date').textContent = new Date().toLocaleDateString('zh-CN');
}

render();
</script>
